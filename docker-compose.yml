services:
  mongo:
    image: mongo:7
    container_name: gwen-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
      MONGO_INITDB_DATABASE: gwen
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gwen-server:
    build:
      context: .
      dockerfile: ./gwen-server/Dockerfile
    container_name: gwen-server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGODB_URI: mongodb://gwen_user:gwen_password@mongo:27017/gwen?authSource=admin
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRATION: 3600000
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  gwen-client:
    build:
      context: .
      dockerfile: ./gwen-client/Dockerfile
    container_name: gwen-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - gwen-server
    restart: unless-stopped

volumes:
  mongo_data:


